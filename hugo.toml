baseURL = "https://umeshsan.github.io/kashba/"
title = 'Kashba'
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableInlineShortcodes = true
disableFastRender = false
relativeURLs = true
canonifyURLs = true

[params]
  siteName = "Kashba"

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 1
    contentDir = "content/en"

  [languages.nl]
    languageName = "Dutch"
    languageCode = "nl"
    weight = 2
    contentDir = "content/nl"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
