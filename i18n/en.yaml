#AboutUs
- id: 'AboutUs'
  translation: 'About Us'

- id: 'AboutPara1'
  translation: 'Kashba started in the early sixties, when the very first Afghan coats were brought back to Amsterdam.'

- id: 'AboutPara2'
  translation: 'We have been travelling extensively ever since, selecting our own import from countries all over Asia, mainly India, Nepal, Tibet and China.'

- id: 'AboutPara3'
  translation: 'Our main criteria are quality and authencity, regardless of age.'

- id: 'AboutPara4'
  translation: 'With this website we offer an impression of our collection and history.'

- id: 'AboutPara5'
  translation: 'Looking at a beautiful piece of artwork, one wonders how and where it was made. From the very beginning we took photographs, many of which you may find here. The more you know, the more you see.'

- id: 'AboutPara6'
  translation: 'Come and visit us or email us if you have any questions. Over the years we have learned not to sell through the website. Sorry, there are too many time-consuming nuisances and imbeciles in the world.'

- id: 'AboutPara7'
  translation: 'Of course, a general introductory email remains a possibility. But we will only respond if you introduce yourself properly and if we are convinced that you are really interested.'

