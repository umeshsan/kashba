#AboutUs
- id: 'AboutUs'
  translation: 'Over Ons'

- id: 'AboutPara1'
  translation: 'Kashba begon in het begin van de jaren zestig, toen de allereerste Afghaanse jassen naar Amsterdam werden gebracht.'

- id: 'AboutPara2'
  translation: 'Sindsdien hebben wij uitgebreid gereisd en selecteren wij onze eigen import uit landen in heel Azië, voornamelijk uit India, Nepal, Tibet en China.'

- id: 'AboutPara3'
  translation: 'Onze belangrijkste criteria zijn kwaliteit en authenticiteit, ongeacht de leeftijd.'

- id: 'AboutPara4'
  translation: 'Met deze website geven wij een indruk van onze collectie en geschiedenis.'

- id: 'AboutPara5'
  translation: 'Wanneer men naar een prachtig kunstwerk kijkt, vraagt men zich af hoe en waar het is gemaakt. Vanaf het allereerste begin hebben wij foto’s gemaakt, waarvan u er hier vele kunt vinden. Hoe meer u weet, hoe meer u ziet.'

- id: 'AboutPara6'
  translation: 'Kom gerust bij ons langs of stuur ons een e-mail als u vragen heeft. In de loop der jaren hebben wij geleerd om niet via de website te verkopen. Helaas zijn er te veel tijdrovende overlast en onserieuze mensen.'

- id: 'AboutPara7'
  translation: 'Natuurlijk blijft een algemene, introductieve e-mail mogelijk. Maar wij zullen alleen reageren als u zich correct voorstelt en als wij ervan overtuigd zijn dat u werkelijk geïnteresseerd bent.'

